apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      # exemplar 允许你从指标点位反向跳到 Trace。
      exemplarTraceIdDestinations:
        - datasourceUid: tempo
          name: TraceID

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # derivedFields 允许从日志正文中的 TraceId 直接跳到 Tempo。
      # 我们在关键业务日志里显式打印了 TraceId=xxxx，方便这里用正则提取。
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "TraceId=([0-9a-f]+)"
          name: TraceId
          url: "$${__value.raw}"

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # tracesToLogsV2 让你从某个 span 直接跳到 Loki 里对应的日志。
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - service.name
          - service.namespace
      serviceMap:
        datasourceUid: prometheus
