# -----------------------------------------------------------------------------
# Loki 负责收日志。
# 这里我们显式打开 structured metadata，原因是 OTLP 日志里很多重要字段
# （如 TraceId、SpanId、service.name、scope、attributes）都依赖元数据保留。
# -----------------------------------------------------------------------------

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

limits_config:
  allow_structured_metadata: true
  volume_enabled: true

compactor:
  working_directory: /loki/compactor

pattern_ingester:
  enabled: true
